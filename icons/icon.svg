<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2d6b"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c2ff"/>
      <stop offset="100%" style="stop-color:#0077ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Network nodes -->
  <circle cx="256" cy="130" r="38" fill="url(#icon)"/>
  <circle cx="110" cy="340" r="32" fill="url(#icon)" opacity="0.85"/>
  <circle cx="402" cy="340" r="32" fill="url(#icon)" opacity="0.85"/>
  <!-- Connecting lines -->
  <line x1="256" y1="168" x2="130" y2="320" stroke="#00c2ff" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <line x1="256" y1="168" x2="382" y2="320" stroke="#00c2ff" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <line x1="142" y1="340" x2="370" y2="340" stroke="#00c2ff" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
  <!-- CRM label -->
  <text x="256" y="460" font-family="'Segoe UI',Arial,sans-serif" font-size="72" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">CRM</text>
</svg>
